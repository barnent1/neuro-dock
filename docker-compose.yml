version: '3'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neurodock
      - DEBUG=true
    volumes:
      - ./:/app
    command: ["uvicorn", "neurodock.main:app", "--host", "0.0.0.0", "--port", "4000", "--workers", "1", "--log-level", "info"]
    depends_on:
      - neo4j
    networks:
      - neurodock-network

  neo4j:
    image: neo4j:5.15.0
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/neurodock
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - neurodock-network

networks:
  neurodock-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
