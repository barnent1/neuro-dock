<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroDock | Memory Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-light">
    <div class="container-fluid">
        <div class="row py-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-hdd-network me-2 fs-4"></i>
                        <h4 class="mb-0">NeuroDock</h4>
                    </div>

                    <div class="d-flex">
                        <a href="/" class="btn btn-dark me-3">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                        <a href="/ui/memories" class="btn btn-dark me-3 active">
                            <i class="bi bi-journal-text"></i> Memories
                        </a>
                        <a href="/ui/apps" class="btn btn-dark me-3">
                            <i class="bi bi-grid"></i> Apps
                        </a>
                    </div>

                    <div class="d-flex">
                        <button class="btn btn-outline-light me-2" id="refresh-btn">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                        <button class="btn btn-primary" id="create-memory-btn">
                            <i class="bi bi-plus-lg"></i> Create Memory
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="search-container">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" class="form-control bg-dark text-light search-input" 
                               placeholder="Search Memories" id="search-memories">
                    </div>
                    
                    <div class="view-options">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-dark active" id="grid-view-btn">
                                <i class="bi bi-grid-3x3-gap"></i>
                            </button>
                            <button type="button" class="btn btn-dark" id="list-view-btn">
                                <i class="bi bi-list"></i>
                            </button>
                        </div>
                        
                        <button class="btn btn-dark ms-2" id="filter-btn">
                            <i class="bi bi-funnel"></i> Filter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="memory-table-header d-flex align-items-center py-2 px-3 bg-dark border-bottom">
                    <div class="form-check me-3">
                        <input class="form-check-input" type="checkbox" id="select-all-memories">
                    </div>
                    <div class="memory-content-header flex-grow-1 d-flex">
                        <div class="memory-icon"><i class="bi bi-journal-text"></i> Memories</div>
                    </div>
                    <div class="memory-category-header">
                        <i class="bi bi-tag"></i> Categories
                    </div>
                    <div class="memory-source-header">
                        <i class="bi bi-app"></i> Source App
                    </div>
                    <div class="memory-date-header">
                        <i class="bi bi-calendar"></i> Created On
                    </div>
                    <div class="memory-actions-header">
                        <i class="bi bi-three-dots-vertical"></i>
                    </div>
                </div>

                <div id="memories-container">
                    <!-- Memory items will be inserted here dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Create Memory Modal -->
    <div class="modal fade" id="createMemoryModal" tabindex="-1" aria-labelledby="createMemoryModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title" id="createMemoryModalLabel">Create New Memory</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="create-memory-form">
                        <div class="mb-3">
                            <label for="memory-content" class="form-label">Memory Content</label>
                            <textarea class="form-control bg-dark text-light" id="memory-content" rows="5" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="memory-type" class="form-label">Memory Type</label>
                            <select class="form-select bg-dark text-light" id="memory-type" required>
                                <option value="NORMAL">Normal</option>
                                <option value="IMPORTANT">Important</option>
                                <option value="TRIVIAL">Trivial</option>
                                <option value="CODE">Code</option>
                                <option value="COMMENT">Comment</option>
                                <option value="DOCUMENTATION">Documentation</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="memory-source" class="form-label">Source</label>
                            <input type="text" class="form-control bg-dark text-light" id="memory-source" value="Manual" required>
                        </div>
                        <div class="mb-3">
                            <label for="memory-project" class="form-label">Project ID (optional)</label>
                            <input type="text" class="form-control bg-dark text-light" id="memory-project">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-memory-btn">Create Memory</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/memory-dashboard.js"></script>
</body>
</html>
